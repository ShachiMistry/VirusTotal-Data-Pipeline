services:
  redis:
    image: redis:7-alpine
    container_name: vt-pipeline-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vt-pipeline-backend
    ports:
      - "8000:8000"
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./virustotal.db
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL_SECONDS=3600
      - VT_RATE_LIMIT_RPM=4
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - CORS_ORIGINS=*
    volumes:
      - ./virustotal.db:/app/virustotal.db
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: vt-pipeline-frontend
    ports:
      - "80:80"
    restart: always
    depends_on:
      - backend
