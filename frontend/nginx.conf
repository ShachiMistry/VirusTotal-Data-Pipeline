server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/v1/* requests to the backend ALB
    # In production, BACKEND_URL is replaced by deploy.sh with the actual ALB DNS
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health check endpoint for the ALB
    location /nginx-health {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # All other routes go to index.html (React SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
